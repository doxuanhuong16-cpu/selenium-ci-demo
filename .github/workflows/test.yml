name: Selenium Test

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  login-success:
    name: Login Success Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: Run Login Success Test
        run: mvn -Dtest=LoginSuccessTest test
        env:
          TLU_USERNAME: ${{ secrets.TLU_USERNAME }}
          TLU_PASSWORD: ${{ secrets.TLU_PASSWORD }}

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: login-success-reports
          path: target/surefire-reports/

  login-wrong-password:
    name: Login Wrong Password Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: Run Login Wrong Password Test
        run: mvn -Dtest=LoginWrongPasswordTest test
        env:
          TLU_USERNAME: ${{ secrets.TLU_USERNAME }}
          TLU_PASSWORD: ${{ secrets.TLU_PASSWORD }}

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: login-wrong-password-reports
          path: target/surefire-reports/
